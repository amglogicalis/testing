# .github/workflows/zenon-trainer-workflow.yml
name: Zenon Trainer Workflow

on:
  workflow_dispatch:
    inputs:
      topic:
        description: 'The topic, framework, or technology to research and learn'
        required: true
        type: string

jobs:
  train:
    name: Run Zenon Trainer
    runs-on: ubuntu-latest
    
    permissions:
      contents: write # Zenon Trainer necesita este permiso para escribir en .zenon_cache.json
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Necesario para análisis de historial si fuera el caso, aunque para trainer suele ser 1

      # Restaurar caché para obtener estadísticas acumuladas y conocimiento previo
      - name: Restore Zenon Knowledge Cache
        uses: actions/cache@v4
        with:
          path: .zenon_cache.json
          key: zenon-knowledge-cache-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            zenon-knowledge-cache-${{ github.ref_name }}-
            zenon-knowledge-cache-

      - name: Run Zenon Trainer Action
        uses: amglogicalis/Zenon/.github/actions/trainer@main
        with:
          topic: ${{ github.event.inputs.topic }}
          zenon-api-key: ${{ secrets.ZENON_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          cohere-api-key: ${{ secrets.COHERE_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          samba-api-key: ${{ secrets.SAMBA_API_KEY }}
          cerebras-api-key: ${{ secrets.CEREBRAS_API_KEY }}
          gh-models-token: ${{ secrets.GH_MODELS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}