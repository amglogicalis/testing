name: Zenon AI Assistant Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo: assist, correct, u objective'
        required: true
        default: 'assist'

jobs:
  zenon:
    runs-on: ubuntu-latest
    
    # IMPORTANTE: Permisos necesarios para que Zenon pueda comentar en PRs o hacer commits en correct/objective mode
    permissions:
      contents: write
      pull-requests: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Zenon AI Assistant
        uses: amglogicalis/my-github-actions@main  # <--- Apunta a tu repo y a la rama 'main' (o la que quieras probar)
        with:
          zenon-api-key: ${{ secrets.ZENON_API_KEY }}
          groq-api-key: ${{ secrets.GROQ_API_KEY }}
          cohere-api-key: ${{ secrets.COHERE_API_KEY }}
          openrouter-api-key: ${{ secrets.OPENROUTER_API_KEY }}
          mode: ${{ github.event.inputs.mode || 'assist' }}